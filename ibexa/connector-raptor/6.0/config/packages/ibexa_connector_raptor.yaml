## Raptor Connector Configuration
##
## This configuration enables Raptor Smart Advisor integration for product recommendations.
## To get started:
## 1. Sign up for Raptor at https://www.raptorsmartadvisor.com/
## 2. Obtain your Customer ID and API Key from Raptor Control Panel

#ibexa:
#    system:
#        default:
#            connector_raptor:
#                enabled: true
#                # Customer ID from Raptor Control Panel
#                customer_id: ''
#                # API Key for Recommendations API from Raptor Control Panel
#                recommendations_api_key: ''
#                # Tracking type: 'client' (JavaScript-based) or 'server' (server-side tracking)
#                tracking_type: 'client'
